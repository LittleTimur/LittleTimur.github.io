<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MealDrop - Voice Synthesis</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Hind:wght@300;400;500;600;700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet"><style>* { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .status {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
            min-height: 20px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .btn:active { transform: translateY(0); }
        .btn.stop {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .timer {
            margin-top: 25px;
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
            font-family: 'Hind', sans-serif;
        }
        .settings {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .settings label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            text-align: left;
        }
        .settings input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            text-align: center;
            margin-bottom: 10px;
        }
        .settings input:focus {
            outline: none;
            border-color: #667eea;
        }
        .indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ccc;
            display: inline-block;
            margin-right: 8px;
            transition: background 0.3s;
        }
        .indicator.active {
            background: #4ade80;
            box-shadow: 0 0 10px #4ade80;
        }
        .log {
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 11px;
            color: #666;
            max-height: 100px;
            overflow-y: auto;
            text-align: left;
        }</style><script defer="defer" src="/index.js"></script></head><body><div class="container"><h1>🔊 Voice Synthesis</h1><div class="status"><span class="indicator" id="indicator"></span> <span id="statusText">Ожидание запуска...</span></div><button class="btn" id="toggleBtn">▶ Запустить</button><div class="timer" id="timer">30</div><div style="color: #999; font-size: 12px; margin-top: 5px;">секунд до следующего запроса</div><div class="settings"><label>Интервал (секунды):</label> <input type="number" id="intervalInput" value="30" min="5" max="300"></div><div class="log" id="log"></div></div><script>// Конфигурация API
    const API_CONFIG = {
        url: 'https://test-api.tatar.ru/public/api/v1/users/62ebcee7064d5c792f8b456e/voice-assistant/synthesis.json',
        headers: {
            'accept': 'application/ld+json',
            'authorization': 'Bearer M9s1JUY2mOvOnTu3MeQw7KJpwh+R+SWdtLCxx7FtSrDqrHPKg8K2FM8lRkkXvXTA6mmMieg00eiWCf8nsJVt7GDDwcivW3Vgv7E7gMfMqrT+DDbVuUFMIA/3Wjokp5dq',
            'Content-Type': 'application/json'
        }
    };

    let audioContext = null;
    let intervalId = null;
    let countdownId = null;
    let isPlaying = false;
    let intervalSeconds = 30;
    let timeLeft = 30;
    let audioQueue = []; // Очередь аудио для последовательного воспроизведения

    const toggleBtn = document.getElementById('toggleBtn');
    const statusText = document.getElementById('statusText');
    const indicator = document.getElementById('indicator');
    const timerDisplay = document.getElementById('timer');
    const intervalInput = document.getElementById('intervalInput');
    const logEl = document.getElementById('log');

    function log(msg) {
        const time = new Date().toLocaleTimeString();
        logEl.innerHTML += `<div>[${time}] ${msg}</div>`;
        logEl.scrollTop = logEl.scrollHeight;
        console.log(`[Synthesis] ${msg}`);
    }

    // Инициализация AudioContext
    function initAudio() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioContext.state === 'suspended') {
            audioContext.resume();
        }
    }

    // Воспроизведение аудио из Blob
    async function playAudioBlob(blob) {
        if (!audioContext) return;

        const arrayBuffer = await blob.arrayBuffer();
        const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

        const source = audioContext.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(audioContext.destination);
        source.start();

        return new Promise(resolve => {
            source.onended = resolve;
        });
    }

    // Запрос к API синтеза
    async function fetchSynthesis(message) {
        log(`📤 Запрос: "${message}"`);

        const response = await fetch(API_CONFIG.url, {
            method: 'POST',
            headers: API_CONFIG.headers,
            body: JSON.stringify({ message })
        });

        if (!response.ok) {
            const errorText = await response.text().catch(() => 'No error details');
            throw new Error(`HTTP ${response.status}: ${errorText}`);
        }

        // Пробуем получить аудио (blob) или текст
        const contentType = response.headers.get('content-type');

        if (contentType?.includes('audio')) {
            log('🎵 Получено аудио');
            return await response.blob();
        } else {
            // Если вернулся JSON с ссылкой на аудио или base64
            const data = await response.json().catch(() => ({}));
            log(`📄 Получен ответ: ${JSON.stringify(data).slice(0, 100)}...`);

            // Если есть audio_url или audio_data - обрабатываем
            if (data.audio_url) {
                log('🔗 Загрузка аудио по ссылке...');
                const audioResp = await fetch(data.audio_url);
                return await audioResp.blob();
            }
            if (data.audio_data) {
                // Base64 audio
                const binary = atob(data.audio_data);
                const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
                return new Blob([bytes], { type: 'audio/wav' });
            }

            // Если просто текст - озвучиваем через Web Speech API (fallback)
            if (data.text || message) {
                log('🗣️ Используем браузерный синтез');
                return await synthesizeWithBrowser(data.text || message);
            }
        }

        throw new Error('Не удалось получить аудио из ответа');
    }

    // Fallback: браузерный SpeechSynthesis
    async function synthesizeWithBrowser(text) {
        return new Promise((resolve, reject) => {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ru-RU';
                utterance.onend = () => resolve(null); // null = не нужно дополнительно играть
                utterance.onerror = reject;
                speechSynthesis.speak(utterance);
            } else {
                reject(new Error('SpeechSynthesis не поддерживается'));
            }
        });
    }

    // Основная функция: запрос + воспроизведение
    async function triggerSynthesis() {
        if (!isPlaying) return;

        const message = new Date().toLocaleString('ru-RU', {
            day: '2-digit', month: '2-digit', year: 'numeric',
            hour: '2-digit', minute: '2-digit', second: '2-digit'
        });

        try {
            statusText.textContent = 'Синтез...';
            indicator.classList.add('active');

            const audioResult = await fetchSynthesis(message);

            // Если вернули blob - играем, если null (browser synthesis) - уже играет
            if (audioResult instanceof Blob) {
                await playAudioBlob(audioResult);
            }

            log('✅ Воспроизведено');
        } catch (error) {
            log(`❌ Ошибка: ${error.message}`);
            statusText.textContent = 'Ошибка';
            indicator.classList.remove('active');
        } finally {
            if (isPlaying) {
                statusText.textContent = `Активно: каждые ${intervalSeconds} сек`;
                indicator.classList.add('active');
            }
        }
    }

    // Таймер обратного отсчёта
    function startCountdown() {
        timeLeft = intervalSeconds;
        timerDisplay.textContent = timeLeft;

        countdownId = setInterval(() => {
            timeLeft--;
            timerDisplay.textContent = timeLeft;
            if (timeLeft <= 0) {
                timeLeft = intervalSeconds;
                timerDisplay.textContent = timeLeft;
            }
        }, 1000);
    }

    function stopCountdown() {
        if (countdownId) {
            clearInterval(countdownId);
            countdownId = null;
        }
    }

    // Запуск цикла
    async function startScheduler() {
        initAudio();
        isPlaying = true;

        // Первый запуск сразу
        await triggerSynthesis();
        startCountdown();

        // Затем по интервалу
        intervalId = setInterval(() => {
            if (isPlaying) {
                triggerSynthesis();
            }
        }, intervalSeconds * 1000);

        // UI
        toggleBtn.textContent = '⏹ Остановить';
        toggleBtn.classList.add('stop');
        statusText.textContent = `Активно: каждые ${intervalSeconds} сек`;
        indicator.classList.add('active');
        intervalInput.disabled = true;
        toggleBtn.disabled = false;
        log('🚀 Запущено');
    }

    // Остановка
    function stopScheduler() {
        isPlaying = false;

        if (intervalId) {
            clearInterval(intervalId);
            intervalId = null;
        }
        stopCountdown();

        // UI
        toggleBtn.textContent = '▶ Запустить';
        toggleBtn.classList.remove('stop');
        statusText.textContent = 'Остановлено';
        indicator.classList.remove('active');
        intervalInput.disabled = false;
        timerDisplay.textContent = intervalSeconds;
        log('⏹ Остановлено');
    }

    // Обработчики
    toggleBtn.addEventListener('click', async () => {
        toggleBtn.disabled = true;

        if (isPlaying) {
            stopScheduler();
            toggleBtn.disabled = false;
        } else {
            const newInterval = parseInt(intervalInput.value);
            if (newInterval >= 5 && newInterval <= 300) {
                intervalSeconds = newInterval;
            }
            await startScheduler();
            // Кнопка уже включена в startScheduler
        }
    });

    intervalInput.addEventListener('change', () => {
        const newInterval = parseInt(intervalInput.value);
        if (newInterval >= 5 && newInterval <= 300) {
            intervalSeconds = newInterval;
            timerDisplay.textContent = newInterval;
            if (isPlaying) {
                // Перезапуск с новым интервалом
                stopScheduler();
                startScheduler();
            }
        }
    });

    intervalInput.addEventListener('input', (e) => {
        let val = parseInt(e.target.value);
        if (isNaN(val) || val < 5) e.target.value = 5;
        if (val > 300) e.target.value = 300;
    });

    // Предзагрузка: разблокировка аудио при первом клике на странице
    document.addEventListener('click', () => {
        if (!audioContext) {
            initAudio();
        }
    }, { once: true });

    log('📦 Готов к работе');</script></body></html>
