<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MealDrop - Voice Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .status-bar {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .status-text.recording {
            color: #ff4757;
            animation: pulse 1s infinite;
        }

        .status-text.playing {
            color: #2ed573;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-button {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .main-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .main-button:active {
            transform: scale(0.95);
        }

        .main-button.active {
            background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
            box-shadow: 0 10px 30px rgba(255, 71, 87, 0.4);
        }

        .main-button.playing {
            background: linear-gradient(135deg, #2ed573 0%, #7bed9f 100%);
            box-shadow: 0 10px 30px rgba(46, 213, 115, 0.4);
        }

        .messages-container {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 85%;
            word-wrap: break-word;
        }

        .message-user {
            background: rgba(102, 126, 234, 0.3);
            margin-left: auto;
            text-align: right;
        }

        .message-assistant {
            background: rgba(255, 255, 255, 0.1);
            margin-right: auto;
        }

        .message-time {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
        }

        .settings-section {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
            margin-top: 20px;
        }

        .settings-section h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: rgba(255, 255, 255, 0.7);
        }

        .setting-item {
            margin-bottom: 15px;
        }

        .setting-item label {
            display: block;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }

        .setting-item input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 14px;
        }

        .setting-item input:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.5);
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 15px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            animation: typing-bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing-bounce {
            0%, 80%, 100% {
                opacity: 0.4;
                transform: scale(0.8);
            }
            40% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .error-message {
            background: rgba(255, 71, 87, 0.2);
            border: 1px solid rgba(255, 71, 87, 0.5);
            color: #ff6b81;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎤 Голосовой Ассистент</h1>

    <div class="status-bar">
        <span id="statusText" class="status-text">Нажмите кнопку для запуска</span>
    </div>

    <button id="mainButton" class="main-button">
        Запустить
    </button>

    <div class="messages-container" id="messagesContainer">
        <div style="text-align: center; color: rgba(255,255,255,0.4); padding: 20px;">
            Сообщения появятся здесь
        </div>
    </div>

    <div class="settings-section">
        <h3>⚙️ Настройки</h3>

        <div class="setting-item">
            <label>Порог громкости (0-100)</label>
            <input type="range" id="thresholdInput" min="0" max="100" value="30">
            <span id="thresholdValue">30</span>
        </div>

        <div class="setting-item">
            <label>Время тишины (мс)</label>
            <input type="number" id="silenceInput" value="1000" min="500" max="5000">
        </div>

        <div class="setting-item">
            <label>User ID</label>
            <input type="text" id="userIdInput" value="5a4bd939064d5c372b8b4578">
        </div>
    </div>
</div>

<script src="voice-control-plugin.js"></script>
<script>
    // ============================================
    // КОНФИГУРАЦИЯ
    // ============================================
    const CONFIG = {
        API_BASE_URL: 'https://test-api.tatar.ru',
        userId: '5a4bd939064d5c372b8b4578',
        threshold: 30,
        silenceTimeout: 1000,
        maxRecordTime: 100000
    };

    // ============================================
    // СОСТОЯНИЕ
    // ============================================
    let voicePlugin = null;
    let isPluginActive = false;
    let isRecording = false;
    let isPlaying = false;
    let isWaitingResponse = false;
    let messages = [];

    // ============================================
    // ЭЛЕМЕНТЫ UI
    // ============================================
    const mainButton = document.getElementById('mainButton');
    const statusText = document.getElementById('statusText');
    const messagesContainer = document.getElementById('messagesContainer');
    const thresholdInput = document.getElementById('thresholdInput');
    const thresholdValue = document.getElementById('thresholdValue');
    const silenceInput = document.getElementById('silenceInput');
    const userIdInput = document.getElementById('userIdInput');

    // ============================================
    // API ФУНКЦИИ (аналог voiceAssistant.js)
    // ============================================
    async function apiRequest(url, data, responseType = 'json') {
        try {
            const response = await fetch(`${CONFIG.API_BASE_URL}${url}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'accept': 'application/ld+json',
                    'authorization': 'Bearer SqjnXErGhC41LpDXd3lt/EYNpkgIoeahCSep+Dbj8Y5RckSi1imQDIq2UAXfyU3PgAo3xTz56cA0WNEUVhnRo45qWNU05YMzqpXBrpwFMF+67tol0zKWb5j/FI5RVkv9'
                },
                body: JSON.stringify(data)
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            if (responseType === 'blob') {
                return await response.blob();
            }

            return await response.json();
        } catch (error) {
            console.error('API Error:', error);
            throw error;
        }
    }

    async function processMessage(message, responseBefore = null) {
        return await apiRequest(
            `/public/api/v1/users/${CONFIG.userId}/voice-assistant/message_processing.json`,
            {
                message: message,
                response_before: responseBefore
            }
        );
    }

    async function synthesizeText(message) {
        return await apiRequest(
            `/public/api/v1/users/${CONFIG.userId}/voice-assistant/synthesis.json`,
            { message: message },
            'blob'
        );
    }

    async function transcribeAudio(base64Content) {
        const response = await apiRequest(
            `/public/api/v1/users/${CONFIG.userId}/voice-assistant/transcription.json`,
            { file: base64Content }
        );

        let messageText = '';
        if (Array.isArray(response?.text)) {
            messageText = response.text.join(' ');
        } else {
            messageText = response?.text || response?.transcription || '';
        }
        messageText = 'у вас есть 9 штрафов на общую сумму 7495 рублей. Они выписаны на автомобиль с номером Х643ТН';
        return messageText;
    }

    // ============================================
    // УТИЛИТЫ
    // ============================================
    function updateStatus(text, type = '') {
        statusText.textContent = text;
        statusText.className = 'status-text ' + type;
    }

    function formatTime(timestamp) {
        return new Date(timestamp).toLocaleTimeString('ru-RU', {
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    function addMessage(text, type) {
        if (messages.length === 0) {
            messagesContainer.innerHTML = '';
        }

        const messageDiv = document.createElement('div');
        messageDiv.className = `message message-${type}`;
        messageDiv.innerHTML = `
                <div>${text}</div>
                <div class="message-time">${formatTime(Date.now())}</div>
            `;

        messagesContainer.appendChild(messageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;

        messages.push({ text, type, timestamp: Date.now() });
    }

    function showTypingIndicator() {
        messagesContainer.innerHTML = '';
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message message-assistant';
        typingDiv.innerHTML = `
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
        messagesContainer.appendChild(typingDiv);
    }

    function blobToBase64(blob) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onloadend = () => {
                const base64String = reader.result.split(',')[1];
                resolve(base64String);
            };
            reader.onerror = reject;
            reader.readAsDataURL(blob);
        });
    }

    async function convertWebmToMp3(webmBlob) {
        return new Promise(async (resolve, reject) => {
            try {
                const audioContext = voicePlugin?.audioContext || new (window.AudioContext || window.webkitAudioContext)();
                const arrayBuffer = await webmBlob.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

                const channels = audioBuffer.numberOfChannels;
                const sampleRate = audioBuffer.sampleRate;
                const samples = audioBuffer.getChannelData(0);

                // Конвертация Float32 в Int16
                const samplesInt16 = new Int16Array(samples.length);
                for (let i = 0; i < samples.length; i++) {
                    const s = Math.max(-1, Math.min(1, samples[i]));
                    samplesInt16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }

                // Инициализация MP3 энкодера
                const mp3encoder = new lamejs.Mp3Encoder(channels, sampleRate, 128);
                const mp3Data = [];

                // Кодирование блоками по 1152 сэмпла
                const sampleBlockSize = 1152;
                for (let i = 0; i < samplesInt16.length; i += sampleBlockSize) {
                    const sampleChunk = samplesInt16.subarray(i, i + sampleBlockSize);
                    const mp3buf = mp3encoder.encodeBuffer(sampleChunk);
                    if (mp3buf.length > 0) {
                        mp3Data.push(mp3buf);
                    }
                }

                // Финализация
                const mp3buf = mp3encoder.flush();
                if (mp3buf.length > 0) {
                    mp3Data.push(mp3buf);
                }

                const mp3Blob = new Blob(mp3Data, { type: 'audio/mpeg' });
                resolve(mp3Blob);
            } catch (error) {
                console.error('Ошибка конвертации в MP3:', error);
                reject(error);
            }
        });
    }

    // ============================================
    // ОСНОВНАЯ ЛОГИКА
    // ============================================
    async function handleRecordingComplete(blob) {
        if (isPlaying) {
            updateStatus('Воспроизведение... (скажите "стоп" для остановки)');
            return;
        }

        console.log(`Запись завершена (размер: ${(blob.size / 1024).toFixed(2)} KB)`);
        updateStatus('Обработка записи...', 'recording');

        try {
            // Конвертация в MP3 (опционально)
            const mp3Blob = await convertWebmToMp3(blob);

            // Конвертация в Base64
            const base64Content = await blobToBase64(mp3Blob);

            console.log('Отправка аудио на сервер:', {
                size: mp3Blob.size,
                base64Length: base64Content.length
            });

            // Транскрипция
            updateStatus('Распознавание речи...');
            const messageText = await transcribeAudio(base64Content);

            if (!messageText) {
                throw new Error('Не удалось распознать текст');
            }

            // Добавляем сообщение пользователя
            addMessage(messageText, 'user');
            updateStatus('Отправка Алисе...');

            // Показываем индикатор ожидания
            showTypingIndicator();
            isWaitingResponse = true;

            // Отправка сообщения Алисе
            const lastMessage = messages.length > 1
                ? messages[messages.length - 2]
                : null;
            const responseBefore = lastMessage ? JSON.stringify({}) : null;

            const apiResponse = await processMessage(messageText, responseBefore);

            isWaitingResponse = false;
            const responseText = apiResponse?.aliceResponse?.response?.text;

            if (responseText) {
                // Добавляем ответ ассистента
                addMessage(responseText, 'assistant');
                updateStatus('Синтез речи...');

                // Синтез и воспроизведение ответа
                const audioBlob = await synthesizeText(responseText);

                updateStatus('Воспроизведение...', 'playing');
                isPlaying = true;

                if (voicePlugin) {
                    await voicePlugin.playAudio(audioBlob);
                }
            }

            updateStatus('Готов к записи');

        } catch (error) {
            console.error('Ошибка при обработке:', error);
            updateStatus('Ошибка: ' + error.message);
            isWaitingResponse = false;

            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = error.message;
            messagesContainer.appendChild(errorDiv);

            setTimeout(() => {
                updateStatus('Готов к записи');
            }, 2000);
        }
    }

    function initVoicePlugin() {
        if (voicePlugin) {
            return;
        }

        voicePlugin = new VoiceControlPlugin({
            onListeningStart: () => {
                console.log('Плагин начал слушать микрофон');
                updateStatus('Слушаю...');
                mainButton.textContent = '🛑 Стоп';
                mainButton.classList.add('active');
            },
            onRecordingStart: () => {
                console.log('Начата запись');
                isRecording = true;
                updateStatus('Идёт запись...', 'recording');
            },
            onRecordingEnd: (blob) => {
                isRecording = false;
                handleRecordingComplete(blob);
            },
            onPlaybackStart: () => {
                console.log('Воспроизведение');
                if (voicePlugin?.isRecording) {
                    voicePlugin.stopRecording();
                }
                isPlaying = true;
                isRecording = false;
                updateStatus('Воспроизведение...', 'playing');
                mainButton.textContent = '🔊 Играет';
                mainButton.classList.remove('active');
                mainButton.classList.add('playing');
            },
            onPlaybackEnd: () => {
                console.log('Воспроизведение завершено');
                isPlaying = false;
                mainButton.textContent = '🎤 Записать';
                mainButton.classList.remove('playing');
                updateStatus('Готов к записи');
            },
            onPlaybackStopped: () => {
                console.log('Воспроизведение остановлено');
                isPlaying = false;
                mainButton.textContent = '🎤 Записать';
                mainButton.classList.remove('playing');
                updateStatus('Готов к записи');
            },
            silenceTimeout: CONFIG.silenceTimeout,
            maxRecordTime: CONFIG.maxRecordTime,
            threshold: CONFIG.threshold,
            stopCommands: ['стоп', 'хватит', 'хват']
        });

        console.log('Плагин инициализирован');
    }

    async function startVoiceControl() {
        try {
            initVoicePlugin();

            // Обновляем настройки из UI
            CONFIG.threshold = parseInt(thresholdInput.value);
            CONFIG.silenceTimeout = parseInt(silenceInput.value);
            CONFIG.userId = userIdInput.value.trim();

            voicePlugin.options.threshold = CONFIG.threshold;
            voicePlugin.options.silenceTimeout = CONFIG.silenceTimeout;

            await voicePlugin.start();
            isPluginActive = true;

            console.log('Плагин голосового управления запущен');
        } catch (error) {
            console.error('Ошибка запуска плагина:', error.message);
            updateStatus('Ошибка: ' + error.message);
            isPluginActive = false;
        }
    }

    function stopVoiceControl() {
        if (voicePlugin) {
            voicePlugin.destroy();
            voicePlugin = null;
        }
        isPluginActive = false;
        isRecording = false;
        isPlaying = false;

        mainButton.textContent = 'Запустить';
        mainButton.classList.remove('active', 'playing');
        updateStatus('Плагин остановлен');

        console.log('Плагин остановлен');
    }

    function toggleVoiceControl() {
        if (isPluginActive) {
            stopVoiceControl();
        } else {
            startVoiceControl();
        }
    }

    // ============================================
    // СОБЫТИЯ
    // ============================================
    mainButton.addEventListener('click', toggleVoiceControl);

    thresholdInput.addEventListener('input', (e) => {
        thresholdValue.textContent = e.target.value;
        CONFIG.threshold = parseInt(e.target.value);
        if (voicePlugin) {
            voicePlugin.options.threshold = CONFIG.threshold;
        }
    });

    silenceInput.addEventListener('change', (e) => {
        CONFIG.silenceTimeout = parseInt(e.target.value);
        if (voicePlugin) {
            voicePlugin.options.silenceTimeout = CONFIG.silenceTimeout;
        }
    });

    userIdInput.addEventListener('change', (e) => {
        CONFIG.userId = e.target.value.trim();
    });

    // Очистка при закрытии страницы
    window.addEventListener('beforeunload', () => {
        if (voicePlugin) {
            voicePlugin.destroy();
        }
    });

    // Инициализация
    console.log('Voice Assistant готов к работе');
    console.log('User ID:', CONFIG.userId);
</script>
</body>
</html>
